<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COSMOS · 宇宙尺度之旅</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --glass-bg: rgba(12, 17, 30, 0.55);
    --glass-border: rgba(140, 170, 255, 0.18);
    --accent: #6ea8ff;
    --accent-warm: #ffb35c;
    --text: #dfe8ff;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    width:100%; height:100%; overflow:hidden;
    background:#03040a; color:var(--text);
    font-family:'Rajdhani','Segoe UI',system-ui,sans-serif;
  }
  #stage{ position:fixed; inset:0; display:block; width:100%; height:100%; touch-action:none; }

  /* ---------- Shared design system (scenes reuse these) ---------- */
  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border:1px solid var(--glass-border);
    border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .btn{
    font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:1.5px;
    color:var(--text); background:rgba(110,168,255,0.08);
    border:1px solid rgba(110,168,255,0.28); border-radius:10px;
    padding:9px 15px; cursor:pointer; white-space:nowrap;
    transition:background .25s, box-shadow .25s, transform .25s, border-color .25s;
  }
  .btn:hover{ background:rgba(110,168,255,0.22); box-shadow:0 0 16px rgba(110,168,255,0.35); transform:translateY(-1px); }
  .btn.active{ background:rgba(110,168,255,0.3); border-color:var(--accent); box-shadow:0 0 18px rgba(110,168,255,0.45); }
  .panel-title{
    font-family:'Orbitron',monospace; font-size:15px; font-weight:700; letter-spacing:3px;
    background:linear-gradient(90deg, #ffd9a0, #6ea8ff 70%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .panel-sub{ font-size:10px; letter-spacing:2.5px; text-transform:uppercase; opacity:0.55; margin-top:3px; }

  /* ---------- Top bar ---------- */
  #topbar{
    position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:20;
    display:flex; align-items:center; gap:22px; padding:10px 18px;
    max-width:calc(100vw - 24px);
  }
  #brand{ display:flex; flex-direction:column; line-height:1.15; user-select:none; }
  #brand b{
    font-family:'Orbitron',monospace; font-size:16px; font-weight:900; letter-spacing:5px;
    background:linear-gradient(90deg, #ffd9a0, #6ea8ff 70%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  #brand span{ font-size:9px; letter-spacing:3px; opacity:0.5; text-transform:uppercase; }
  #nav{ display:flex; gap:6px; }
  #nav a{
    text-decoration:none; color:var(--text); font-size:13px; font-weight:600; letter-spacing:1px;
    padding:8px 14px; border-radius:10px; border:1px solid transparent;
    transition:background .25s, border-color .25s, box-shadow .25s;
    display:flex; flex-direction:column; align-items:center; line-height:1.2;
  }
  #nav a small{ font-size:9px; letter-spacing:2px; opacity:0.5; font-weight:400; }
  #nav a:hover{ background:rgba(110,168,255,0.14); }
  #nav a.active{
    background:rgba(110,168,255,0.22); border-color:var(--accent);
    box-shadow:0 0 16px rgba(110,168,255,0.35);
  }
  #controls{ display:flex; align-items:center; gap:10px; }
  #quality{
    font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px;
    color:var(--text); background:rgba(110,168,255,0.08);
    border:1px solid rgba(110,168,255,0.28); border-radius:8px; padding:6px 8px;
    cursor:pointer; outline:none;
  }
  #quality option{ background:#0c1220; }
  #fps{ font-size:12px; font-weight:600; letter-spacing:1px; opacity:0.7; min-width:52px; text-align:right; font-variant-numeric:tabular-nums; }
  #mute{ padding:7px 11px; font-size:14px; line-height:1; }

  /* ---------- Scene HUD mount point ---------- */
  #scene-hud{ position:fixed; inset:0; z-index:10; pointer-events:none; }
  #scene-hud > *{ pointer-events:auto; }

  /* ---------- Loading & transition ---------- */
  #loading{
    position:fixed; inset:0; z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:#03040a;
    transition:opacity .5s ease; 
  }
  #loading.hide{ opacity:0; pointer-events:none; }
  #loading .ring{
    width:46px; height:46px; border-radius:50%;
    border:2px solid rgba(110,168,255,0.15); border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  #loading p{ font-size:12px; letter-spacing:4px; text-transform:uppercase; opacity:0.6; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #fade{
    position:fixed; inset:0; z-index:30; background:#03040a;
    opacity:0; pointer-events:none; transition:opacity .35s ease;
  }
  #fade.on{ opacity:1; pointer-events:auto; }

  /* ---------- Warp transition ---------- */
  #warpfx{ position:fixed; inset:0; z-index:45; width:100%; height:100%; cursor:wait; }

  /* ---------- Intro overview ---------- */
  #intro{
    position:fixed; inset:0; z-index:60; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:26px; background:#03040a;
    transition:opacity .8s ease; cursor:pointer;
  }
  #intro.hide{ opacity:0; pointer-events:none; }
  #intro h1{
    font-family:'Orbitron',monospace; font-size:44px; font-weight:900; letter-spacing:16px;
    padding-left:16px;
    background:linear-gradient(90deg, #ffd9a0, #6ea8ff 70%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    animation:intro-rise .9s ease both;
  }
  #intro .tag{
    font-size:12px; letter-spacing:5px; text-transform:uppercase; opacity:0.55;
    animation:intro-rise .9s .25s ease both;
  }
  #intro .scale{
    position:relative; width:min(560px, 78vw); height:64px; margin-top:14px;
  }
  #intro .scale .bar{
    position:absolute; left:0; right:0; top:50%; height:1px;
    background:linear-gradient(90deg, rgba(255,179,92,0.7), rgba(110,168,255,0.7));
    transform:scaleX(0); transform-origin:left;
    animation:intro-bar 1.6s .5s ease forwards;
  }
  #intro .node{
    position:absolute; top:50%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:5px;
    opacity:0; animation:intro-node .6s ease forwards;
  }
  #intro .node i{
    width:9px; height:9px; border-radius:50%; background:var(--c, #6ea8ff);
    box-shadow:0 0 12px var(--c, #6ea8ff);
  }
  #intro .node b{ font-size:13px; font-weight:600; letter-spacing:2px; white-space:nowrap; }
  #intro .node span{ font-size:10px; letter-spacing:1.5px; opacity:0.5; font-variant-numeric:tabular-nums; white-space:nowrap; }
  #intro .n1{ left:6%;  --c:#ffb35c; animation-delay:1.0s; }
  #intro .n2{ left:50%; --c:#b48cff; animation-delay:1.55s; }
  #intro .n3{ left:94%; --c:#6ea8ff; animation-delay:2.1s; }
  #intro .skip{
    margin-top:10px; font-size:10px; letter-spacing:3px; text-transform:uppercase; opacity:0.35;
    animation:intro-blink 1.6s 2.4s ease infinite;
  }
  @keyframes intro-rise{ from{ opacity:0; transform:translateY(18px); } to{ opacity:1; transform:none; } }
  @keyframes intro-bar{ to{ transform:scaleX(1); } }
  @keyframes intro-node{ from{ opacity:0; transform:translate(-50%,-30%); } to{ opacity:1; transform:translate(-50%,-50%); } }
  @keyframes intro-blink{ 0%,100%{ opacity:0.35; } 50%{ opacity:0.08; } }

  /* ---------- Fatal error ---------- */
  #fallback{
    position:fixed; inset:0; z-index:50; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:10px; background:#03040a; text-align:center;
  }
  #fallback.show{ display:flex; }
  #fallback h2{ font-family:'Orbitron',monospace; letter-spacing:3px; font-size:18px; }
  #fallback p{ font-size:13px; opacity:0.65; }
  #fallback pre{ font-size:11px; opacity:0.5; max-width:80vw; max-height:30vh; overflow:auto; text-align:left; }

  @media (max-width: 760px){
    #topbar{ gap:10px; padding:8px 10px; top:8px; }
    #brand span{ display:none; }
    #nav a{ padding:6px 8px; font-size:11px; }
    #nav a small{ display:none; }
    #fps{ display:none; }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/build/three.module.min.js",
    "three/addons/": "./vendor/three/examples/jsm/"
  }
}
</script>
</head>
<body data-scene="none" data-ready="0">
  <canvas id="stage"></canvas>

  <header id="topbar" class="glass">
    <div id="brand"><b>COSMOS</b><span>A Journey of Cosmic Scales</span></div>
    <nav id="nav">
      <a href="#/blackhole" data-route="blackhole">黑洞<small>BLACK HOLE</small></a>
      <a href="#/galaxy" data-route="galaxy">银河系<small>MILKY WAY</small></a>
      <a href="#/solar" data-route="solar">太阳系<small>SOLAR SYSTEM</small></a>
    </nav>
    <div id="controls">
      <button id="mute" class="btn" title="声音 Sound">🔊</button>
      <select id="quality" title="画质 Quality">
        <option value="auto">自动画质</option>
        <option value="high">高画质</option>
        <option value="medium">中画质</option>
        <option value="low">低画质</option>
        <option value="potato">极简画质</option>
      </select>
      <div id="fps">-- FPS</div>
    </div>
  </header>

  <div id="scene-hud"></div>

  <div id="intro">
    <h1>COSMOS</h1>
    <p class="tag">宇宙尺度之旅 · A Journey of Cosmic Scales</p>
    <div class="scale">
      <div class="bar"></div>
      <div class="node n1"><i></i><b>黑洞</b><span>10⁻⁴ pc</span></div>
      <div class="node n2"><i></i><b>银河系</b><span>30 kpc</span></div>
      <div class="node n3"><i></i><b>太阳系</b><span>45 亿 km</span></div>
    </div>
    <p class="skip">点击任意处进入 · Click anywhere to enter</p>
  </div>

  <div id="fade"></div>
  <div id="loading"><div class="ring"></div><p>Entering the cosmos</p></div>
  <div id="fallback">
    <h2>FAILED TO LAUNCH</h2>
    <p>渲染初始化失败，请确认浏览器支持 WebGL2 后刷新重试。</p>
    <pre id="fallback-detail"></pre>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
