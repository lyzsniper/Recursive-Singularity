<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELIO · Interactive 3D Solar System</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --glass-bg: rgba(12, 17, 30, 0.55);
    --glass-border: rgba(140, 170, 255, 0.18);
    --accent: #6ea8ff;
    --accent-warm: #ffb35c;
    --text: #dfe8ff;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    width:100%; height:100%; overflow:hidden;
    background:#03040a; color:var(--text);
    font-family:'Rajdhani', 'Segoe UI', system-ui, sans-serif;
  }
  #scene{ position:fixed; inset:0; display:block; cursor:grab; }
  #scene:active{ cursor:grabbing; }

  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border:1px solid var(--glass-border);
    border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* ---------- Title ---------- */
  #title-card{ position:fixed; top:20px; left:20px; padding:14px 22px; z-index:10; }
  #title-card h1{
    font-family:'Orbitron', monospace; font-size:19px; font-weight:700; letter-spacing:4px;
    background:linear-gradient(90deg, #ffd9a0, #6ea8ff 70%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  #title-card p{ font-size:12px; letter-spacing:2.5px; text-transform:uppercase; opacity:0.55; margin-top:3px; }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:'Rajdhani', sans-serif; font-size:13px; font-weight:600; letter-spacing:1.5px;
    color:var(--text); background:rgba(110,168,255,0.08);
    border:1px solid rgba(110,168,255,0.28); border-radius:10px;
    padding:9px 15px; cursor:pointer; white-space:nowrap;
    transition:background .25s, box-shadow .25s, transform .25s, border-color .25s;
  }
  .btn:hover{ background:rgba(110,168,255,0.22); box-shadow:0 0 16px rgba(110,168,255,0.35); transform:translateY(-1px); }
  .btn.active{ background:rgba(110,168,255,0.3); border-color:var(--accent); box-shadow:0 0 18px rgba(110,168,255,0.45); }

  /* ---------- Camera presets ---------- */
  #presets{ position:fixed; top:20px; right:20px; display:flex; gap:8px; padding:10px; z-index:10; }

  /* ---------- Time panel ---------- */
  #time-panel{
    position:fixed; left:20px; bottom:20px; z-index:10;
    display:flex; align-items:center; gap:16px; padding:12px 20px 12px 12px;
  }
  #play-btn{
    width:44px; height:44px; border-radius:50%; flex:0 0 auto;
    border:1px solid rgba(255,179,92,0.5); cursor:pointer;
    background:radial-gradient(circle at 35% 30%, rgba(255,200,130,0.35), rgba(255,150,60,0.12));
    color:#ffd9a0; font-size:15px; line-height:1;
    transition:box-shadow .25s, transform .25s;
  }
  #play-btn:hover{ box-shadow:0 0 18px rgba(255,179,92,0.5); transform:scale(1.06); }
  #speed-wrap{ display:flex; flex-direction:column; gap:4px; }
  #speed-wrap label{ font-size:10px; letter-spacing:2.5px; text-transform:uppercase; opacity:0.55; }
  #speed-slider{
    -webkit-appearance:none; appearance:none; width:190px; height:4px; border-radius:2px;
    background:linear-gradient(90deg, var(--accent-warm), rgba(110,168,255,0.35));
    outline:none; cursor:pointer;
  }
  #speed-slider::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:15px; height:15px; border-radius:50%;
    background:#fff; border:2px solid var(--accent-warm);
    box-shadow:0 0 10px rgba(255,179,92,0.8); cursor:pointer;
  }
  #speed-slider::-moz-range-thumb{
    width:13px; height:13px; border-radius:50%;
    background:#fff; border:2px solid var(--accent-warm);
    box-shadow:0 0 10px rgba(255,179,92,0.8); cursor:pointer;
  }
  #speed-label{
    font-family:'Orbitron', monospace; font-size:14px; min-width:56px; text-align:right;
    color:#ffd9a0; text-shadow:0 0 12px rgba(255,179,92,0.5);
  }

  /* ---------- Hint / unfocus ---------- */
  #hint{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:5;
    font-size:11px; letter-spacing:2.5px; text-transform:uppercase; opacity:0.5; pointer-events:none;
  }
  #unfocus-btn{ position:fixed; bottom:86px; left:50%; transform:translateX(-50%); z-index:10; }
  .hidden{ display:none !important; }

  /* ---------- Info card ---------- */
  #info-card{
    position:fixed; top:50%; right:24px; width:330px; z-index:11;
    padding:26px 24px 22px;
    transform:translate(130%, -50%);
    transition:transform .6s cubic-bezier(.22,1,.36,1);
  }
  #info-card.visible{ transform:translate(0, -50%); }
  #card-close{
    position:absolute; top:8px; right:14px; background:none; border:none;
    color:var(--text); font-size:24px; cursor:pointer; opacity:0.55; transition:opacity .2s;
  }
  #card-close:hover{ opacity:1; }
  #card-name{
    font-family:'Orbitron', monospace; font-size:26px; font-weight:700; letter-spacing:2px; margin-bottom:8px;
    background:linear-gradient(90deg, #fff, #9dbfff);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .badge{
    display:inline-block; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
    padding:4px 12px; border-radius:20px; border:1px solid var(--accent); color:var(--accent); margin-bottom:16px;
  }
  .row{
    display:flex; justify-content:space-between; align-items:baseline; gap:12px;
    padding:9px 0; border-bottom:1px solid rgba(140,170,255,0.12); font-size:14px;
  }
  .row span{ opacity:0.6; letter-spacing:0.5px; }
  .row b{ font-weight:600; text-align:right; }
  #card-fact{
    margin-top:16px; font-size:14px; line-height:1.55; opacity:0.88;
    border-left:2px solid var(--accent-warm); padding-left:12px; font-style:italic;
  }

  /* ---------- Tooltip ---------- */
  #tooltip{
    position:fixed; z-index:20; display:none; pointer-events:none;
    padding:5px 13px; font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
    background:rgba(12,17,30,0.8); border:1px solid var(--glass-border); border-radius:8px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }

  /* ---------- Loading ---------- */
  #loading{
    position:fixed; inset:0; z-index:100; background:#03040a;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    transition:opacity .9s ease;
  }
  #loading.done{ opacity:0; pointer-events:none; }
  .spinner{
    width:52px; height:52px; border-radius:50%;
    border:2px solid rgba(110,168,255,0.15); border-top-color:var(--accent-warm);
    animation:spin 1s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #loading p{ font-family:'Orbitron', monospace; font-size:13px; letter-spacing:4px; text-transform:uppercase; opacity:0.7; }
  #loading .sub{ font-family:'Rajdhani', sans-serif; font-size:12px; letter-spacing:2px; opacity:0.4; text-transform:none; }

  /* ---------- Responsive ---------- */
  @media (max-width: 760px){
    #title-card{ top:12px; left:12px; padding:10px 16px; }
    #title-card h1{ font-size:14px; letter-spacing:3px; }
    #title-card p{ font-size:10px; }
    #presets{ top:auto; bottom:96px; right:12px; flex-direction:column; padding:8px; gap:6px; }
    #presets .btn{ font-size:11px; padding:8px 11px; }
    #time-panel{ left:12px; bottom:12px; gap:10px; padding:10px 14px 10px 10px; }
    #play-btn{ width:38px; height:38px; font-size:13px; }
    #speed-slider{ width:110px; }
    #speed-label{ font-size:12px; min-width:46px; }
    #hint{ display:none; }
    #unfocus-btn{ bottom:auto; top:74px; left:12px; transform:none; font-size:11px; }
    #info-card{
      top:auto; bottom:0; right:0; left:0; width:100%; max-height:48vh; overflow-y:auto;
      border-radius:18px 18px 0 0; transform:translateY(130%);
    }
    #info-card.visible{ transform:translateY(0); }
    #card-name{ font-size:20px; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="loading">
  <div class="spinner"></div>
  <p>Forging the Solar System</p>
  <p class="sub">procedurally generating planetary surfaces…</p>
</div>

<header id="title-card" class="glass">
  <h1>HELIO</h1>
  <p>Interactive Solar System</p>
</header>

<nav id="presets" class="glass">
  <button class="btn" data-preset="top">Top-Down View</button>
  <button class="btn" data-preset="earth">Earth–Moon System</button>
  <button class="btn" data-preset="cinematic">Cinematic Orbit</button>
</nav>

<div id="time-panel" class="glass">
  <button id="play-btn" title="Pause (Space)">❚❚</button>
  <div id="speed-wrap">
    <label>Time Warp</label>
    <input type="range" id="speed-slider" min="0" max="100" step="0.5" value="37">
  </div>
  <div id="speed-label">1.0×</div>
</div>

<button id="unfocus-btn" class="btn glass hidden">⟲ &nbsp;Return to System View</button>

<aside id="info-card" class="glass">
  <button id="card-close" title="Close">×</button>
  <h2 id="card-name">Earth</h2>
  <span id="card-type" class="badge">Rocky Planet</span>
  <div class="row"><span>Distance from Sun</span><b id="card-dist"></b></div>
  <div class="row"><span>Day Length</span><b id="card-day"></b></div>
  <div class="row"><span>Orbital Period</span><b id="card-year"></b></div>
  <p id="card-fact"></p>
</aside>

<div id="tooltip" class="glass"></div>
<div id="hint">Drag to orbit &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click a planet to focus</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
'use strict';

/* ============================================================
   Bootstrapping with CDN fallback for OrbitControls
   ============================================================ */
function start(){
  // Double rAF: let the loading overlay paint before the heavy
  // procedural texture generation blocks the main thread.
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    try{ init(); }
    catch(err){
      var l = document.getElementById('loading');
      l.innerHTML = '<p style="color:#ff8a8a">Failed to start WebGL scene</p><p class="sub">' + err.message + '</p>';
      console.error(err);
    }
  });});
}
if (window.THREE && THREE.OrbitControls){ start(); }
else {
  var fb = document.createElement('script');
  fb.src = 'https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js';
  fb.onload = start;
  fb.onerror = function(){
    document.getElementById('loading').innerHTML =
      '<p style="color:#ff8a8a">Could not load Three.js libraries</p><p class="sub">check your network connection and reload</p>';
  };
  document.head.appendChild(fb);
}

/* ============================================================
   Seeded RNG + value noise (for procedural textures)
   ============================================================ */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function makeNoise(seed){
  var rand = mulberry32(seed);
  var p = new Uint8Array(256), i, j, t;
  for (i = 0; i < 256; i++) p[i] = i;
  for (i = 255; i > 0; i--){ j = (rand() * (i + 1)) | 0; t = p[i]; p[i] = p[j]; p[j] = t; }
  var perm = new Uint8Array(512);
  for (i = 0; i < 512; i++) perm[i] = p[i & 255];
  function fade(t){ return t * t * (3 - 2 * t); }
  function n2(x, y){
    var X = Math.floor(x), Y = Math.floor(y);
    var xf = x - X, yf = y - Y, xi = X & 255, yi = Y & 255;
    var u = fade(xf), v = fade(yf);
    var aa = perm[xi + perm[yi]] / 255,     ba = perm[xi + 1 + perm[yi]] / 255;
    var ab = perm[xi + perm[yi + 1]] / 255, bb = perm[xi + 1 + perm[yi + 1]] / 255;
    return aa + (ba - aa) * u + (ab - aa) * v + (aa - ba - ab + bb) * u * v;
  }
  function fbm(x, y, oct){
    oct = oct || 5;
    var a = 0.5, f = 1, s = 0, n = 0;
    for (var i = 0; i < oct; i++){ s += a * n2(x * f, y * f); n += a; a *= 0.5; f *= 2.03; }
    return s / n;
  }
  return { n2: n2, fbm: fbm };
}

// Seamless (x-wrapping) fbm so equirectangular textures have no visible seam.
function sfbm(nz, u, v, f, oct){
  var a = nz.fbm(u * f, v * f, oct);
  var b = nz.fbm((u - 1) * f, v * f, oct);
  return a + (b - a) * u;
}

/* ============================================================
   Color helpers
   ============================================================ */
function hex(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function mixc(a, b, t){
  t = Math.max(0, Math.min(1, t));
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}
function clamp255(v){ return v < 0 ? 0 : v > 255 ? 255 : v; }

/* ============================================================
   Per-pixel texture painter
   ============================================================ */
function paintTexture(w, h, painter){
  var c = document.createElement('canvas'); c.width = w; c.height = h;
  var ctx = c.getContext('2d');
  var img = ctx.createImageData(w, h), d = img.data;
  for (var y = 0; y < h; y++){
    var v = y / h;
    for (var x = 0; x < w; x++){
      var col = painter(x / w, v);
      var i = (y * w + x) * 4;
      d[i]   = clamp255(col[0]);
      d[i+1] = clamp255(col[1]);
      d[i+2] = clamp255(col[2]);
      d[i+3] = col.length > 3 ? clamp255(col[3]) : 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

function addCraters(ctx, w, h, count, rng){
  for (var i = 0; i < count; i++){
    var x = rng() * w, y = h * 0.07 + rng() * h * 0.86;
    var r = 1 + rng() * rng() * (w * 0.018 + 4);
    var dark = 0.10 + rng() * 0.20, light = 0.05 + rng() * 0.10;
    var offsets = [0];
    if (x < r * 2) offsets.push(w);
    if (x > w - r * 2) offsets.push(-w);
    for (var k = 0; k < offsets.length; k++){
      var cx = x + offsets[k];
      ctx.beginPath(); ctx.arc(cx, y, r, 0, 6.2832);
      ctx.fillStyle = 'rgba(0,0,0,' + dark.toFixed(3) + ')'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx - r * 0.22, y - r * 0.22, r * 0.88, 0, 6.2832);
      ctx.strokeStyle = 'rgba(255,255,255,' + light.toFixed(3) + ')';
      ctx.lineWidth = Math.max(1, r * 0.16); ctx.stroke();
    }
  }
}

/* ============================================================
   Planet surface painters  (u,v in [0,1] equirectangular)
   ============================================================ */
function paintMercury(nz){
  return function(u, v){
    var n = sfbm(nz, u, v, 5, 5), m = sfbm(nz, u, v, 16, 4);
    var g = 96 + (n - 0.5) * 92 + (m - 0.5) * 42;
    return [g, g * 0.99, g * 0.96];
  };
}

function paintMoon(nz){
  var nz2 = makeNoise(913);
  return function(u, v){
    var n = sfbm(nz, u, v, 6, 5);
    var g = 122 + (n - 0.5) * 82;
    var maria = sfbm(nz2, u, v, 3, 4);
    if (maria > 0.56) g *= 1 - (maria - 0.56) * 1.15;
    return [g, g, g * 1.02];
  };
}

function paintVenus(nz){
  return function(u, v){
    var s1 = sfbm(nz, u, v, 3, 5);
    var swirl = 1 - Math.abs(2 * sfbm(nz, u, v + s1 * 0.45, 6, 5) - 1);
    var t = swirl * 0.7 + sfbm(nz, u, v, 12, 4) * 0.3;
    return mixc([212, 174, 116], [242, 222, 172], t);
  };
}

function paintEarth(nz){
  return function(u, v){
    var e = sfbm(nz, u, v, 5, 6) + 0.25 * sfbm(nz, u, v, 14, 4) - 0.12;
    var moist = sfbm(nz, u, v, 7, 4);
    var r, g, b;
    if (e > 0.52){
      var t = (e - 0.52) / 0.48;
      if (moist > 0.55){ r = 58 + t * 82;  g = 108 + t * 62; b = 48 + t * 32; }
      else             { r = 152 + t * 62; g = 118 + t * 42; b = 68 + t * 30; }
      if (t > 0.55){ r = 118 + t * 105; g = 112 + t * 95; b = 108 + t * 85; }
    } else {
      var d = Math.max(0, (0.52 - e) / 0.52);
      r = 12 + 22 * (1 - d); g = 46 + 52 * (1 - d); b = 112 + 92 * (1 - d);
      if (e > 0.47){ r = 26; g = 112; b = 162; }
    }
    var polar = Math.abs(v - 0.5) * 2;
    var ice = 0;
    if (polar > 0.86) ice = 1;
    else if (polar > 0.79) ice = (polar - 0.79) / 0.07 * (0.35 + 0.65 * sfbm(nz, u, v, 10, 3));
    if (ice > 0.25){
      r = r * (1 - ice) + 236 * ice;
      g = g * (1 - ice) + 241 * ice;
      b = b * (1 - ice) + 246 * ice;
    }
    return [r, g, b];
  };
}

function paintClouds(nz){
  return function(u, v){
    var c = sfbm(nz, u, v, 5, 5) + 0.3 * sfbm(nz, u, v, 13, 4);
    var a = Math.max(0, Math.min(1, (c - 0.52) * 3.4));
    return [255, 255, 255, a * 225];
  };
}

function paintMars(nz){
  return function(u, v){
    var n = sfbm(nz, u, v, 5, 5), d = sfbm(nz, u, v, 9, 4);
    var c = mixc([146, 72, 42], [208, 122, 70], n);
    if (d > 0.6) c = mixc(c, [102, 50, 34], (d - 0.6) * 2);
    var polar = Math.abs(v - 0.5) * 2;
    if (polar > 0.9) c = mixc(c, [236, 231, 223], Math.min(1, (polar - 0.9) * 10) * 0.9);
    return c;
  };
}

var J_BANDS = [
  [0.00,'#9c8468'],[0.06,'#8a7358'],[0.11,'#c9b795'],[0.17,'#a0805e'],
  [0.23,'#e0d2b2'],[0.30,'#b08a64'],[0.36,'#e8ddc4'],[0.43,'#c3a37c'],
  [0.50,'#dccaa9'],[0.56,'#9a7a58'],[0.63,'#cbb691'],[0.70,'#a58560'],
  [0.77,'#d5c5a4'],[0.84,'#94805f'],[0.91,'#c0ae8c'],[0.96,'#a08a68'],[1.00,'#9c8468']
].map(function(b){ return [b[0], hex(b[1])]; });

var S_BANDS = [
  [0.00,'#c4b28a'],[0.125,'#b3a078'],[0.25,'#d6c8a0'],[0.375,'#c9b88e'],
  [0.50,'#e0d4b0'],[0.625,'#cfc09a'],[0.75,'#bbaa82'],[0.875,'#d2c4a0'],[1.00,'#c4b48e']
].map(function(b){ return [b[0], hex(b[1])]; });

function bandSample(bands, v){
  for (var i = 0; i < bands.length - 1; i++){
    var a = bands[i], b = bands[i + 1];
    if (v >= a[0] && v <= b[0]) return mixc(a[1], b[1], (v - a[0]) / (b[0] - a[0]));
  }
  return bands[bands.length - 1][1];
}

function paintJupiter(nz){
  return function(u, v){
    var turb = (sfbm(nz, u, v, 7, 5) - 0.5) * 0.09;
    var vv = Math.min(0.999, Math.max(0.001, v + turb));
    var c = bandSample(J_BANDS, vv);
    var br = 0.9 + sfbm(nz, u, v, 26, 3) * 0.2;
    c = [c[0] * br, c[1] * br, c[2] * br];
    // Great Red Spot
    var dx = u - 0.7, dy = (v - 0.64) * 1.9;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < 0.085){
      c = mixc(c, [198, 86, 58], Math.min(1, (1 - d / 0.085) * 1.6));
      if (d > 0.06) c = mixc(c, [142, 52, 40], (d - 0.06) / 0.025 * 0.5);
    }
    return c;
  };
}

function paintSaturn(nz){
  return function(u, v){
    var turb = (sfbm(nz, u, v, 6, 4) - 0.5) * 0.045;
    var vv = Math.min(0.999, Math.max(0.001, v + turb));
    var c = bandSample(S_BANDS, vv);
    var br = 0.94 + sfbm(nz, u, v, 22, 3) * 0.12;
    return [c[0] * br, c[1] * br, c[2] * br];
  };
}

function paintUranus(nz){
  return function(u, v){
    var band = Math.sin(v * Math.PI * 6) * 0.5 + 0.5;
    var n = sfbm(nz, u, v, 4, 4);
    var c = mixc([138, 198, 212], [180, 228, 233], n * 0.72 + band * 0.14);
    if (v < 0.12 || v > 0.88) c = mixc(c, [202, 236, 239], 0.35);
    return c;
  };
}

function paintNeptune(nz){
  return function(u, v){
    var n = sfbm(nz, u, v, 5, 5);
    var c = mixc([36, 68, 168], [72, 122, 216], n);
    var streak = Math.max(0, sfbm(nz, u, v, 20, 3) - 0.7) * 3;
    c = mixc(c, [222, 232, 246], Math.min(1, streak) * 0.5);
    var dx = u - 0.62, dy = (v - 0.42) * 2.1;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < 0.07) c = mixc(c, [22, 40, 100], (1 - d / 0.07) * 0.8);
    return c;
  };
}

function paintSun(nz){
  var nz2 = makeNoise(555);
  return function(u, v){
    var g = sfbm(nz, u, v, 18, 4), g2 = sfbm(nz, u, v, 6, 3);
    var c = mixc([255, 148, 48], [255, 216, 122], g * 0.7 + g2 * 0.3);
    var sp = sfbm(nz2, u, v, 3, 3);
    if (sp > 0.7) c = mixc(c, [184, 72, 30], Math.min(1, (sp - 0.7) * 4) * 0.7);
    return c;
  };
}

  /* ---------- Texture factory ---------- */
  function makeBodyTexture(w, h, seed, painterFn, craters){
    var nz = makeNoise(seed);
    var c = paintTexture(w, h, painterFn(nz));
    if (craters) addCraters(c.getContext('2d'), w, h, craters, mulberry32(seed * 7 + 1));
    var t = new THREE.CanvasTexture(c);
    t.encoding = THREE.sRGBEncoding;

  }

    mercury : makeBodyTexture(512, 256, 11,  paintMercury, 150),

    neptune : makeBodyTexture(512, 256, 111, paintNeptune, 0),
    moon    : makeBodyTexture(512, 256, 123, paintMoon,    170),
    sun     : makeBodyTexture(512, 256, 7,   paintSun,     0)
  };

  // Saturn ring texture: radial bands mapped onto RingGeometry's planar UVs.
  (function buildRingTexture(){
    var nz = makeNoise(2024);
    var innerFrac = RING_INNER / RING_OUTER;
    var c = paintTexture(512, 512, function(u, v){
      var dx = u - 0.5, dy = v - 0.5;
      var r = Math.sqrt(dx * dx + dy * dy) * 2;
      if (r > 1 || r < innerFrac) return [0, 0, 0, 0];
      var t = (r - innerFrac) / (1 - innerFrac);
      var a = 0.25 + 0.65 * nz.fbm(t * 22, 3.7, 4);
      if (Math.abs(t - 0.68) < 0.035) a *= 0.15;   // Cassini division
      if (Math.abs(t - 0.40) < 0.020) a *= 0.5;    // secondary gap
      a *= Math.min(1, t / 0.06);                  // inner fade
      a *= Math.min(1, (1 - t) / 0.08);            // outer fade
      var shade = 0.75 + 0.25 * nz.fbm(t * 9, 8.1, 3);
      return [212 * shade, 196 * shade, 168 * shade, Math.max(0, Math.min(1, a)) * 255];
    });
    var t = new THREE.CanvasTexture(c);
    t.encoding = THREE.sRGBEncoding;
    t.anisotropy = maxAniso;
    TEX.ring = t;
  })();

  /* ---------- Starfield (shader points with twinkle) ---------- */
  (function buildStars(){
    var N = 2600;
    var pos = new Float32Array(N * 3);
    var size = new Float32Array(N);
    var phase = new Float32Array(N);
    var col = new Float32Array(N * 3);
    var rng = mulberry32(4242);
    var palette = [[1,1,1],[0.8,0.86,1],[1,0.9,0.75],[0.9,0.95,1],[1,0.82,0.82]];
    for (var i = 0; i < N; i++){
      // uniform direction on sphere
      var z = rng() * 2 - 1, th = rng() * Math.PI * 2;
      var rr = Math.sqrt(1 - z * z);
      var dx = rr * Math.cos(th), dy = z, dz = rr * Math.sin(th);
      if (rng() < 0.35){ dy *= 0.22; }              // milky-way band
      var rad = 550 + rng() * 700;
      pos[i*3] = dx * rad; pos[i*3+1] = dy * rad; pos[i*3+2] = dz * rad;
      size[i] = 1.2 + rng() * 2.4 + (rng() < 0.04 ? 1.6 : 0);
      phase[i] = rng();
      var pc = palette[(rng() * palette.length) | 0];
      col[i*3] = pc[0]; col[i*3+1] = pc[1]; col[i*3+2] = pc[2];
    }
    var g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('aSize', new THREE.BufferAttribute(size, 1));
    g.setAttribute('aPhase', new THREE.BufferAttribute(phase, 1));
    g.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
    var m = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: [
        'attribute float aSize;',
        'attribute float aPhase;',
        'attribute vec3 aColor;',
        'uniform float uTime;',
        'varying vec3 vColor;',
        'varying float vTw;',
        'void main(){',
        '  vColor = aColor;',
        '  float tw = 0.72 + 0.28 * sin(uTime * (0.6 + aPhase * 1.7) + aPhase * 17.0);',
        '  vTw = tw;',
        '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
        '  gl_PointSize = aSize * tw;',
        '  gl_Position = projectionMatrix * mv;',
        '}'
      ].join('\n'),
      fragmentShader: [
        'varying vec3 vColor;',
        'varying float vTw;',
        'void main(){',
        '  float d = length(gl_PointCoord - vec2(0.5));',
        '  float a = smoothstep(0.5, 0.05, d);',
        '  gl_FragColor = vec4(vColor, a * vTw);',
        '}'
      ].join('\n'),
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    var stars = new THREE.Points(g, m);
    stars.name = 'starfield';
    scene.add(stars);
    window.__starMat = m;
  })();

  /* ---------- Nebula sprites ---------- */
  function glowSprite(stops, scale, opacity, position){
    var s = 256;
    var c = document.createElement('canvas'); c.width = s; c.height = s;
    var ctx = c.getContext('2d');
    var g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    for (var i = 0; i < stops.length; i++) g.addColorStop(stops[i][0], stops[i][1]);
    ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
    var tex = new THREE.CanvasTexture(c);
    var mat = new THREE.SpriteMaterial({
      map: tex, transparent: true, opacity: opacity,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    var sp = new THREE.Sprite(mat);
    sp.scale.set(scale, scale, 1);
    if (position) sp.position.copy(position);
    scene.add(sp);
    return sp;
  }
  glowSprite([[0,'rgba(96,64,160,0.55)'],[0.5,'rgba(60,40,110,0.18)'],[1,'rgba(40,20,80,0)']], 950, 0.10, new THREE.Vector3(-650, 140, -520));
  glowSprite([[0,'rgba(32,96,128,0.55)'],[0.5,'rgba(20,60,90,0.16)'],[1,'rgba(10,30,50,0)']], 850, 0.09, new THREE.Vector3(620, -90, -660));

      'varying vec3 vNormal;',

  glowSprite([[0,'rgba(255,240,200,1)'],[0.25,'rgba(255,200,110,0.55)'],[0.6,'rgba(255,150,60,0.16)'],[1,'rgba(255,120,40,0)']], SUN_R * 7, 0.95, new THREE.Vector3(0,0,0));

  var PLANETS = [

    { key:'earth', name:'Earth', type:'Rocky Planet', radius:2.3, dist:48,  period:1,      rotDays:1,     tilt:23.4,  seg:48, rough:0.7,

    { key:'neptune', name:'Neptune', type:'Ice Giant', radius:3.6, dist:148, period:164.8,  rotDays:0.67,  tilt:28.3,  seg:48, rough:0.95,
      info:{ dist:'4.50 billion km', day:'16.1 hours', year:'164.8 Earth years',

  ];

  /* ---------- Build planets ---------- */
  var bodies = [];

  function registerBody(cfg, group, mesh){

  // The Sun as a clickable body

    name:'Sun', type:'G-type Main-Sequence Star', radius:SUN_R, dist:0, period:0, rotDays:0,

  PLANETS.forEach(function(p){

    focused = body;
    controls.autoRotate = false;
    setActivePreset(null);
    var p = body.getPos(new THREE.Vector3());
    prevFocusPos.copy(p);
    var dir = camera.position.clone().sub(p);
    if (dir.lengthSq() < 1e-4) dir.set(1, 0.4, 1);
    dir.normalize();
    dir.y = Math.max(dir.y, 0.35);
    dir.normalize();
    var dist = body.radius * 4.5 + 2.2;
    flyTo({
      pos: function(){ return body.getPos(new THREE.Vector3()).addScaledVector(dir, dist); },
      target: function(){ return body.getPos(new THREE.Vector3()); },
      dur: 1.3,
      onDone: function(){
        controls.minDistance = body.radius * 1.7 + 0.4;
        prevFocusPos.copy(body.getPos(new THREE.Vector3()));
      }
    });
    showCard(body);
    unfocusBtn.classList.remove('hidden');
  }

  function unfocus(){
    focused = null;
    controls.autoRotate = false;
    setActivePreset(null);
    hideCard();
    unfocusBtn.classList.add('hidden');
    flyTo({
      pos: new THREE.Vector3(0, 52, 158),
      target: new THREE.Vector3(0, 0, 0),
      dur: 1.4,
      onDone: function(){ controls.minDistance = 16; }
    });
  }
  unfocusBtn.addEventListener('click', unfocus);
  document.getElementById('card-close').addEventListener('click', unfocus);

  presetBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      var preset = btn.getAttribute('data-preset');
      hideCard();
      unfocusBtn.classList.add('hidden');
      if (preset === 'earth'){
        setActivePreset('earth');
        focusBody(earthBody);
        setActivePreset('earth');
      } else if (preset === 'top'){
        focused = null; controls.autoRotate = false;
        flyTo({
          pos: new THREE.Vector3(0, 235, 0.02),
          target: new THREE.Vector3(0, 0, 0),
          dur: 1.5,
          onDone: function(){ controls.minDistance = 16; }
        });
        setActivePreset('top');
      } else if (preset === 'cinematic'){
        focused = null;
        flyTo({
          pos: new THREE.Vector3(138, 24, 72),
          target: new THREE.Vector3(0, 5, 0),
          dur: 1.6,
          onDone: function(){
            controls.minDistance = 16;
            controls.autoRotate = true;
          }
        });
        setActivePreset('cinematic');
      }
    });
  });

  window.addEventListener('keydown', function(e){
    if (e.code === 'Space'){ e.preventDefault(); togglePlay(); }
    if (e.code === 'Escape' && focused) unfocus();
  });

  /* ---------- Raycasting: hover tooltip + click-to-focus ---------- */
  var raycaster = new THREE.Raycaster();
  var mouse = new THREE.Vector2();
  var downPos = null;

  canvas.addEventListener('pointerdown', function(e){
    downPos = { x: e.clientX, y: e.clientY };
  });
  canvas.addEventListener('pointerup', function(e){
    if (!downPos) return;
    var dx = e.clientX - downPos.x, dy = e.clientY - downPos.y;
    downPos = null;
    if (dx * dx + dy * dy > 36 || fly.active) return;   // it was a drag, not a click
    mouse.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
    raycaster.setFromCamera(mouse, camera);
    var hits = raycaster.intersectObjects(clickables, false);
    if (hits.length && hits[0].object.userData.body) focusBody(hits[0].object.userData.body);
  });
  canvas.addEventListener('pointermove', function(e){
    if (e.pointerType === 'touch') return;
    if (fly.active){ tooltip.style.display = 'none'; return; }
    mouse.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
    raycaster.setFromCamera(mouse, camera);
    var hits = raycaster.intersectObjects(clickables, false);
    if (hits.length && hits[0].object.userData.body){
      tooltip.textContent = hits[0].object.userData.body.name;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 12) + 'px';
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.style.display = 'none';
      canvas.style.cursor = 'grab';
    }
  });

  /* ---------- Resize ---------- */
  window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ============================================================
     Animation loop
     ============================================================ */
  var clock = new THREE.Clock();
  var simTime = 0;
  var firstFrame = true;

  // Cinematic intro fly-in
  flyTo({
    pos: new THREE.Vector3(0, 52, 158),
    target: new THREE.Vector3(0, 0, 0),
    dur: 2.4,
    onDone: function(){ controls.minDistance = 16; }
  });

  function animate(){
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.05);
    var eff = playing ? speed : 0;
    simTime += dt * eff;

    // Orbits + rotations (counter-clockwise seen from the north ecliptic pole)
    for (var i = 0; i < bodies.length; i++){
      var b = bodies[i];
      if (b.orbitSpeed){
        var a = b.a0 + simTime * b.orbitSpeed;
        b.group.position.set(Math.cos(a) * b.dist, 0, -Math.sin(a) * b.dist);
      }
      if (b.rotSpeed) b.mesh.rotation.y = simTime * b.rotSpeed;
    }
    // Moon around Earth
    var ma = 1.3 + simTime * 0.9;
    moonOrbit.position.set(Math.cos(ma) * 4.2, 0, -Math.sin(ma) * 4.2);
    cloudMesh.rotation.y = simTime * (0.35 * 1.3);
    sunMesh.rotation.y = simTime * 0.02;
    beltGroup.rotation.y = simTime * 0.05;

    // Shader clocks (real time so twinkle/shimmer continue while paused)
    window.__starMat.uniforms.uTime.value = clock.elapsedTime;
    coronaMat.uniforms.uTime.value = clock.elapsedTime;

    // Camera fly-to
    if (fly.active){
      fly.t += dt / fly.dur;
      var e = easeInOutCubic(Math.min(1, fly.t));
      camera.position.lerpVectors(fly.fromPos, fly.posFn(), e);
      controls.target.lerpVectors(fly.fromTg, fly.tgFn(), e);
      if (fly.t >= 1){
        fly.active = false;
        controls.enabled = true;
        if (fly.onDone) fly.onDone();
      }
    } else if (focused){
      // Follow the focused body as it orbits
      var p = focused.getPos(new THREE.Vector3());
      focusDelta.copy(p).sub(prevFocusPos);
      camera.position.add(focusDelta);
      controls.target.copy(p);
      prevFocusPos.copy(p);
    }

    controls.update();
    renderer.render(scene, camera);

    if (firstFrame){
      firstFrame = false;
      var loading = document.getElementById('loading');
      loading.classList.add('done');
      setTimeout(function(){ loading.remove(); }, 1000);
    }
  }
  animate();
}

})();
</script>
</body>
</html>
